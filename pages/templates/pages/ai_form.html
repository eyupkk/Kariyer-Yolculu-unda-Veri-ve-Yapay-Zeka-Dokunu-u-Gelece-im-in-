{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geleceğim İçin | Gelişmiş AI Kariyer Analizi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --glass: rgba(255, 255, 255, 0.9); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .bg-mesh { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%); }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; color: #1e293b; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .step-pill { padding: 6px 16px; background: #e2e8f0; border-radius: 100px; font-size: 0.8rem; font-weight: 700; color: #64748b; }
        .question-title { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.2; }
        .option-box { border: 2px solid #e2e8f0; border-radius: 20px; padding: 20px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); background: #fff; margin-bottom: 15px; }
        .option-box:hover { border-color: #6366f1; transform: translateY(-2px); background: #f8fafc; }
        .option-box.selected { border-color: #6366f1; background: #eff6ff; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        .btn-ai { background: var(--primary-gradient); border: none; padding: 16px 32px; border-radius: 18px; color: white; font-weight: 700; transition: all 0.3s; }
        .btn-ai:hover { opacity: 0.9; transform: scale(1.02); }
        .btn-ai:disabled { background: #cbd5e1; transform: none; }
        .progress-container { height: 6px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-gradient); transition: width 0.6s cubic-bezier(0.65, 0, 0.35, 1); }
        .fade-step { display: none; }
        .fade-step.active { display: block; animation: fadeInUp 0.5s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
        <div class="col-lg-8">
            <div class="glass-card p-4 p-md-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <span class="step-pill" id="stepIndicator">SORU 1 / 20</span>
                    <div class="w-50 ms-4">
                        <div class="progress-container">
                            <div class="progress-fill" id="progressFill" style="width: 5%;"></div>
                        </div>
                    </div>
                </div>

                <form id="complexAiForm" method="POST" action="{% url 'ai_analiz' %}">
                    {% csrf_token %}
                    <div id="questionsContainer"></div>
                    <input type="hidden" name="a_puan" id="a_puan" value="0">
                    <input type="hidden" name="g_puan" id="g_puan" value="0">
                    <input type="hidden" name="s_puan" id="s_puan" value="0">

                    <div class="d-flex justify-content-between mt-5">
                        <button type="button" class="btn btn-link text-decoration-none text-muted fw-bold" id="prevBtn" onclick="moveStep(-1)" style="display:none;">Geri Dön</button>
                        <button type="button" class="btn btn-ai ms-auto" id="nextBtn" onclick="moveStep(1)" disabled>Sıradaki Soru <i class="bi bi-arrow-right ms-2"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
    const questions = [
        { q: "Bir projede beklenmedik bir teknik hata (bug) oluştuğunda tepkin ne olur?", options: [
            { t: "Kod yapısını ve hata loglarını saatlerce inceler, kök nedeni bulurum.", type: "a", p: 7 },
            { t: "Hızlıca ekibi toplar, kriz yönetimi yapar ve iş birliğiyle çözeriz.", type: "g", p: 7 },
            { t: "Hatayı kapatacak yaratıcı ve estetik bir geçici çözüm arayüzü kurgularım.", type: "s", p: 7 }
        ]},
        { q: "Hangi dünyada yaşamak senin potansiyelini daha iyi yansıtır?", options: [
            { t: "Yapay zeka ve verinin her şeyi yönettiği dijital bir ekosistemde.", type: "a", p: 6 },
            { t: "Girişimlerin ve ticaretin yön verdiği küresel bir metropolde.", type: "g", p: 6 },
            { t: "Mimarinin ve tasarımın ruhu beslediği estetik bir şehirde.", type: "s", p: 6 }
        ]},
        { q: "Ekonomik bir kriz anında hangisi seni daha çok heyecanlandırır?", options: [
            { t: "Finansal verileri analiz edip risk haritası çıkarmak.", type: "a", p: 5 },
            { t: "Pazardaki boşlukları görüp yeni bir iş fırsatı yaratmak.", type: "g", p: 8 },
            { t: "İnsanların moralini düzeltecek sanatsal bir kampanya kurgulamak.", type: "s", p: 5 }
        ]},
        { q: "Bir mobil uygulama yapacak olsan önceliğin hangisi olurdu?", options: [
            { t: "Algoritmanın kusursuz çalışması ve veritabanı güvenliği.", type: "a", p: 8 },
            { t: "Uygulamanın kaç kişiye ulaşacağı ve nasıl para kazanacağı.", type: "g", p: 7 },
            { t: "Kullanıcı arayüzünün (UI) benzersizliği ve akışın şıklığı.", type: "s", p: 8 }
        ]},
        { q: "Karmaşık bir konuyu başkasına anlatırken hangisini kullanırsın?", options: [
            { t: "İstatistikler, grafikler ve teknik terimler.", type: "a", p: 6 },
            { t: "Vizyoner bir hikaye ve ikna edici bir hitabet.", type: "g", p: 6 },
            { t: "Metaforlar, çizimler ve görsel sunumlar.", type: "s", p: 6 }
        ]},
        { q: "İş hayatında seni en çok ne tatmin eder?", options: [
            { t: "Çözülmesi imkansız görünen bir problemi çözmek.", type: "a", p: 7 },
            { t: "Sektörde lider bir konuma gelmek ve rekabeti kazanmak.", type: "g", p: 7 },
            { t: "İnsanların 'Vay be!' diyeceği özgün bir eser bırakmak.", type: "s", p: 7 }
        ]},
        { q: "Hangi disiplin senin zihnini daha çok açar?", options: [
            { t: "Matematiksel Modelleme veya Algoritma Analizi.", type: "a", p: 8 },
            { t: "Stratejik Yönetim veya Ekonomi.", type: "g", p: 8 },
            { t: "Sinematografi veya Endüstriyel Tasarım.", type: "s", p: 8 }
        ]},
        { q: "Bir şehri yeniden inşa edecek olsan ilk nereden başlardın?", options: [
            { t: "Akıllı altyapı ve veri tabanlı enerji sistemlerinden.", type: "a", p: 6 },
            { t: "Ticaret merkezleri ve lojistik ağlarından.", type: "g", p: 6 },
            { t: "Müzeler, parklar ve estetik meydanlardan.", type: "s", p: 6 }
        ]},
        { q: "Bir hatayı savunurken hangisine güvenirsin?", options: [
            { t: "Somut verilere ve bilimsel gerçeklere.", type: "a", p: 7 },
            { t: "Liderlik yetkinliğime ve ekip güvenime.", type: "g", p: 5 },
            { t: "Durumun getirdiği yaratıcı mazeretlere ve empatiye.", type: "s", p: 4 }
        ]},
        { q: "Geleceğin teknolojilerinden hangisi seni daha çok çekiyor?", options: [
            { t: "Kuantum bilgisayarlar ve büyük veri analizi.", type: "a", p: 8 },
            { t: "Blokzincir tabanlı yeni ticaret modelleri.", type: "g", p: 8 },
            { t: "Metaverse içindeki sanatsal ve dijital dünyalar.", type: "s", p: 8 }
        ]},
        { q: "Sosyal medyada karşına çıkan hangi içerik seni durdurur?", options: [
            { t: "Karmaşık bir sorunun teknik çözüm videosu.", type: "a", p: 5 },
            { t: "Bir girişimcinin başarı hikayesi ve stratejileri.", type: "g", p: 7 },
            { t: "Mükemmel ışıkla çekilmiş bir sanat veya tasarım karesi.", type: "s", p: 7 }
        ]},
        { q: "Sence hangisi daha değerli bir yetenektir?", options: [
            { t: "Kaosu düzenli bir sisteme dönüştürmek.", type: "a", p: 7 },
            { t: "Gelecekteki fırsatları rakiplerinden önce fark etmek.", type: "g", p: 7 },
            { t: "Hiç olmayanı hayal edip somutlaştırmak.", type: "s", p: 7 }
        ]},
        { q: "Bir ekipte çalışırken en çok hangi rolden korkarsın?", options: [
            { t: "Sadece duygusal kararların alındığı plansız bir rolden.", type: "a", p: 6 },
            { t: "Risk almaktan çekinilen durağan bir rolden.", type: "g", p: 6 },
            { t: "Yaratıcılığın kısıtlandığı tekdüze bir rolden.", type: "s", p: 6 }
        ]},
        { q: "Tarihteki hangi figür senin idolün olabilir?", options: [
            { t: "Alan Turing (Kod kırıcı ve bilim insanı).", type: "a", p: 8 },
            { t: "Steve Jobs (Vizyoner ve iş dünyası lideri).", type: "g", p: 8 },
            { t: "Leonardo da Vinci (Çok yönlü sanatçı ve mucit).", type: "s", p: 8 }
        ]},
        { q: "Son soru: Gelecekte isminin yanına hangi sıfatın yazılmasını istersin?", options: [
            { t: "Üstün Zekalı ve Bilge (Mastermind).", type: "a", p: 10 },
            { t: "Yol Gösteren ve Lider (The Catalyst).", type: "g", p: 10 },
            { t: "İlham Veren ve Yaratıcı (The Visionary).", type: "s", p: 10 }
        ]}
    ];

    let currentStep = 0;
    const container = document.getElementById('questionsContainer');

    function initQuestions() {
        container.innerHTML = ""; // Mevcutları temizle
        questions.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = `fade-step ${index === 0 ? 'active' : ''}`;
            div.id = `step${index}`;
            div.innerHTML = `<h2 class="question-title mb-5">${item.q}</h2>`;
            item.options.forEach(opt => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option-box';
                optDiv.innerHTML = `<h6 class="mb-0 fw-bold">${opt.t}</h6>`;
                optDiv.onclick = () => selectOption(index, opt.type, opt.p, optDiv);
                div.appendChild(optDiv);
            });
            container.appendChild(div);
        });
    }

    function selectOption(stepIdx, type, points, el) {
        const currentStepEl = document.getElementById(`step${stepIdx}`);
        currentStepEl.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        
        // Puanı ilgili gizli inputa ekle
        document.getElementById(`${type}_puan`).value = parseInt(document.getElementById(`${type}_puan`).value) + points;
        document.getElementById('nextBtn').disabled = false;
        
        // Otomatik geçiş istersen (isteğe bağlı):
        // setTimeout(() => moveStep(1), 300);
    }

    function moveStep(n) {
        if (currentStep + n >= questions.length) {
            document.getElementById('complexAiForm').submit();
            return;
        }
        document.getElementById(`step${currentStep}`).classList.remove('active');
        currentStep += n;
        document.getElementById(`step${currentStep}`).classList.add('active');
        
        document.getElementById('stepIndicator').innerText = `SORU ${currentStep + 1} / ${questions.length}`;
        document.getElementById('progressFill').style.width = `${((currentStep + 1) / questions.length) * 100}%`;
        document.getElementById('prevBtn').style.display = currentStep > 0 ? 'block' : 'none';
        document.getElementById('nextBtn').innerText = currentStep === questions.length - 1 ? "Analizi Tamamla" : "Sıradaki Soru";
        document.getElementById('nextBtn').disabled = true;
    }

    initQuestions();
</script>
</body>
</html>
